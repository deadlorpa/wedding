<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Left ring -->
  <circle cx="24" cy="32" r="12" fill="none" stroke="#b89a6a" stroke-width="5"/>
  <!-- Right ring -->
  <circle cx="40" cy="32" r="12" fill="none" stroke="#b89a6a" stroke-width="5"/>
  <!-- Overlap mask: redraw center overlap in background color to simulate interlock -->
  <!-- Front arc of left ring over right ring -->
  <path d="M 34.4 23.2 A 12 12 0 0 1 34.4 40.8" fill="none" stroke="#fdf8f2" stroke-width="5.5"/>
  <!-- Front arc of right ring over left ring -->
  <path d="M 29.6 40.8 A 12 12 0 0 1 29.6 23.2" fill="none" stroke="#fdf8f2" stroke-width="5.5"/>
  <!-- Redraw visible arcs on top -->
  <path d="M 34.4 23.2 A 12 12 0 0 0 34.4 40.8" fill="none" stroke="#b89a6a" stroke-width="5"/>
  <path d="M 29.6 40.8 A 12 12 0 0 0 29.6 23.2" fill="none" stroke="#b89a6a" stroke-width="5"/>
</svg>
